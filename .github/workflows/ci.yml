# Regression gates for the design system — one named job per quality
# dimension so the Actions tab reads as a scorecard: an engineer
# evaluating HaTchi-MaXchi sees exactly what is guaranteed and where.
#
# Lives inside the package prefix: inert in the Dazzle monorepo (GitHub
# only reads the repo-root .github/), live in the standalone repo.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Console-domain: published-class coverage, committed artifacts match a
  # fresh build (what the CDN serves == what the sources say), the prefix
  # transform is total, the gallery regenerates byte-identically with
  # zero Dazzle code, and the upstream-boundary rule (no dazzle imports).
  contract:
    name: Contract & boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: |
          python build.py
          python build.py --out /tmp/hm-ax --prefix ax-
      - run: python -m pytest tests/test_contract.py tests/test_boundary.py -q

  # Interactive contracts in headless Chromium: command palette keys
  # (⌘K / Esc / arrows), designed hx-confirm interception, theme toggle
  # + persistence, copy-to-clipboard feedback.
  behaviour:
    name: Behaviour (headless Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pytest playwright
          playwright install --with-deps chromium
      - run: python -m pytest tests/test_behaviour.py -q

  # WCAG 2.2 AA conformance via axe-core, light + dark + opened-overlay
  # states. The allowlist may only shrink — and it is currently EMPTY.
  accessibility:
    name: Accessibility (WCAG 2.2 AA, axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pytest playwright
          playwright install --with-deps chromium
      - run: python -m pytest tests/test_wcag.py -q

  # Markup validity: the gallery (which embeds every component's live
  # canonical markup) must be conforming HTML — validated by the Nu
  # (W3C) checker. Documented exclusions, all "vnu lags the platform"
  # or intentional-htmx: CSS grammar (logical properties, @layer, oklch
  # relative color, light-dark()); `hx-*` attributes (htmx's deliberate
  # validity trade-off; it also accepts data-hx-*); and `closedby` (the
  # standard <dialog> light-dismiss attribute, too new for vnu's grammar).
  # Everything structural still gates.
  validity:
    name: Markup validity (Nu/W3C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install html5validator
      - run: >
          html5validator --root site --match index.html
          --ignore-re 'CSS: ' 'Attribute "hx-[a-z-]+" not allowed'
          'Attribute "closedby" not allowed'

  # Screenshot regression vs committed per-platform baselines (linux set
  # generated by update-baselines.yml in this same environment).
  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pytest playwright pillow
          playwright install --with-deps chromium
      - run: python -m pytest tests/test_visual.py -q
      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: tests/.diff/
          if-no-files-found: ignore
